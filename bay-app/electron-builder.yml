appId: com.tee24.bay-checkin
productName: Tee24 Bay Check-In
copyright: Copyright © 2026 Tee24

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - "!node_modules/**/*"

extraResources:
  - from: dist/renderer
    to: renderer

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico

nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: false
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Tee24 Bay Check-In

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.business
